backend:
  name: github
  repo: ignacio-arnaiz/urbigis_web
  branch: main
  base_url: https://sveltia-cms-auth.pages.dev

media_folder: "img/blog"
public_folder: "/img/blog"

site_url: https://ignacio-arnaiz.github.io/urbigis_web

collections:
  - name: "posts"
    label: "Entradas del blog"
    label_singular: "Entrada"
    folder: "blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Fecha", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Imagen destacada", name: "image", widget: "image", required: false }
      - { label: "Contenido", name: "body", widget: "markdown" }
