<h3 id="what-is-it">What is it</h3>
<p>It is an operation that affects geolocatable graphic and alphanumeric data in <a href="http://urbithings.com/">urbiGIS</a>. It is an atomic process, that is, it must be executed in its entirety without incident, otherwise it will be interrupted, returning the system to the initial state.</p>
